<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}WC 2026{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { accent: '#f59e0b' }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-[#0d1117] text-slate-100 min-h-full text-sm" style="font-family:'Inter',sans-serif;">

  <header class="bg-[#161b22] border-b border-[#30363d] sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 h-12 flex items-center justify-between gap-6">
      <a href="/" class="flex items-center gap-2 shrink-0">
        <span class="font-bold text-white tracking-tight">WC<span class="text-amber-400">2026</span></span>
      </a>
      <nav class="flex items-center gap-1 text-xs font-medium">
        <a href="/" class="px-3 py-1.5 rounded {% if active == 'home' %}bg-[#21262d] text-white{% else %}text-slate-400 hover:text-white hover:bg-[#21262d]{% endif %} transition-colors">Prédictions</a>
        <a href="/standings" class="px-3 py-1.5 rounded {% if active == 'standings' %}bg-[#21262d] text-white{% else %}text-slate-400 hover:text-white hover:bg-[#21262d]{% endif %} transition-colors">Groupes</a>
        <a href="/bracket" class="px-3 py-1.5 rounded {% if active == 'bracket' %}bg-[#21262d] text-white{% else %}text-slate-400 hover:text-white hover:bg-[#21262d]{% endif %} transition-colors">Bracket</a>
        <a href="/history" class="px-3 py-1.5 rounded {% if active == 'history' %}bg-[#21262d] text-white{% else %}text-slate-400 hover:text-white hover:bg-[#21262d]{% endif %} transition-colors">Historique</a>
        <a href="/stats" class="px-3 py-1.5 rounded {% if active == 'stats' %}bg-[#21262d] text-white{% else %}text-slate-400 hover:text-white hover:bg-[#21262d]{% endif %} transition-colors">Stats</a>
        <a href="/elo" class="hidden sm:block px-3 py-1.5 rounded {% if active == 'elo' %}bg-[#21262d] text-white{% else %}text-slate-400 hover:text-white hover:bg-[#21262d]{% endif %} transition-colors">ELO</a>
      </nav>
      <a href="/admin" class="text-xs text-slate-500 hover:text-amber-400 transition-colors shrink-0">Admin</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
