<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}WC 2026 Predictions{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { wc: '#f59e0b' }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen" style="font-family: 'Inter', sans-serif;">

  <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-bold text-lg">
        <span class="text-2xl">⚽</span>
        <span class="text-white">WC <span class="text-amber-400">2026</span></span>
        <span class="hidden sm:block text-slate-500 text-sm font-normal ml-2">ML Predictions</span>
      </a>
      <div class="flex items-center gap-1 sm:gap-4 text-sm">
        <a href="/" class="px-3 py-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors {% if active == 'home' %}text-white bg-slate-800{% endif %}">Accueil</a>
        <a href="/bracket" class="px-3 py-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors {% if active == 'bracket' %}text-white bg-slate-800{% endif %}">Bracket</a>
        <a href="/elo" class="px-3 py-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors {% if active == 'elo' %}text-white bg-slate-800{% endif %}">ELO</a>
        <a href="/admin" class="ml-2 px-3 py-1.5 rounded-lg bg-amber-500/10 text-amber-400 hover:bg-amber-500/20 transition-colors text-xs font-medium border border-amber-500/20">Admin</a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-slate-800 mt-16 py-6 text-center text-slate-600 text-sm">
    WC 2026 · Modèle ML entraîné sur 150 ans de football international · Données ELO en temps réel
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
